<!DOCTYPE html>
<html>
<head>
    <title>Việt Chat Realtime</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #000; color: white; overflow: hidden; }

        /* Cột trái: Danh sách bạn bè (Sidebar) */
        #sidebar { width: 350px; border-right: 1px solid #333; background-color: #000; padding: 20px; display: flex; flex-direction: column; }
        #sidebar h2 { margin-bottom: 20px; font-size: 1.5rem; }
        .user-item { padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .user-item:hover { background-color: #1a1a1a; }
        .user-item.active { background-color: #262626; }
        .avatar { width: 45px; height: 45px; background-color: #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Cột phải: Khung Chat */
        #main-chat { flex: 1; display: flex; flex-direction: column; background-color: #000; }
        #chat-header { padding: 15px 25px; border-bottom: 1px solid #333; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }

        /* Bong bóng chat kiểu Messenger */
        .msg-wrapper { display: flex; flex-direction: column; margin-bottom: 10px; max-width: 70%; }
        .msg { padding: 10px 16px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; font-size: 0.95rem; }
        
        .my-msg-wrapper { align-self: flex-end; align-items: flex-end; }
        .my-msg { background-color: #0084ff; color: white; }
        
        .other-msg-wrapper { align-self: flex-start; align-items: flex-start; }
        .other-msg { background-color: #303030; color: white; }
        
        .msg-info { font-size: 0.7rem; color: #888; margin: 4px 8px; }

        /* Ô nhập liệu phía dưới */
        #input-area { padding: 20px; background-color: #000; display: flex; gap: 12px; align-items: center; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: none; background-color: #2a2a2a; color: white; outline: none; font-size: 1rem; }
        button { background: none; border: none; color: #0084ff; cursor: pointer; font-weight: bold; font-size: 1rem; padding: 0 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Đoạn chat</h2>
        <div class="user-item active">
            <div class="avatar" style="background-color: #0084ff;">V</div>
            <div>
                <strong>Việt Chat Pro</strong><br>
                <small style="color: #888;">Nhóm tổng hợp đang online</small>
            </div>
        </div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div class="avatar" style="width: 35px; height: 35px;">V</div>
            <span>Phòng Chat Realtime</span>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="messageText" placeholder="Aa" autocomplete="off">
            <button onclick="sendMessage()">GỬI</button>
        </div>
    </div>

    <script>
        // Lấy tên người dùng từ prompt (Để phân biệt các tab)
        var username = prompt("Nhập tên của Việt để bắt đầu chat:", "Người dùng_" + Math.floor(Math.random() * 100));
        
        // Kết nối đến server FastAPI qua đường ống WebSocket
        var ws = new WebSocket(`ws://localhost:8000/ws/${username}`);

        ws.onmessage = function(event) {
            var data = JSON.parse(event.data);
            var messages = document.getElementById('messages');
            
            // Tạo thẻ bọc tin nhắn
            var wrapper = document.createElement('div');
            var isMe = (data.sender === username);
            wrapper.className = isMe ? 'msg-wrapper my-msg-wrapper' : 'msg-wrapper other-msg-wrapper';

            // Tạo bong bóng tin nhắn
            var message = document.createElement('div');
            message.className = isMe ? 'msg my-msg' : 'msg other-msg';
            
            // Nếu là hệ thống thì hiển thị khác đi một chút
            if(data.sender === "Hệ thống") {
                message.style.backgroundColor = "transparent";
                message.style.color = "#888";
                message.style.fontSize = "0.8rem";
                message.style.alignSelf = "center";
                message.textContent = data.content;
                messages.appendChild(message);
            } else {
                message.textContent = data.content;
                
                var info = document.createElement('div');
                info.className = 'msg-info';
                info.textContent = isMe ? data.time : `${data.sender} • ${data.time}`;

                wrapper.appendChild(message);
                wrapper.appendChild(info);
                messages.appendChild(wrapper);
            }
            
            // Tự động cuộn xuống cuối
            messages.scrollTop = messages.scrollHeight;
        };

        function sendMessage() {
            var input = document.getElementById("messageText");
            if (input.value.trim() !== "") {
                ws.send(input.value);
                input.value = '';
            }
        }

        document.getElementById("messageText").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
