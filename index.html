<!DOCTYPE html>
<html>
<head>
    <title>Việt Chat Realtime</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #000; color: white; }

        /* Cột trái: Danh sách bạn bè (Sidebar) */
        #sidebar { width: 300px; border-right: 1px solid #333; background-color: #121212; padding: 20px; }
        .user-item { padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 5px; }
        .user-item:hover { background-color: #2a2a2a; }
        .user-item.active { background-color: #2a2a2a; border-left: 4px solid #0084ff; }

        /* Cột phải: Khung Chat */
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 15px 25px; border-bottom: 1px solid #333; font-weight: bold; font-size: 1.2rem; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

        /* Bong bóng chat kiểu Messenger */
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; }
        .my-msg { align-self: flex-end; background-color: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .other-msg { align-self: flex-start; background-color: #3e4042; color: white; border-bottom-left-radius: 4px; }

        /* Ô nhập liệu phía dưới */
        #input-area { padding: 20px; background-color: #121212; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background-color: #2a2a2a; color: white; outline: none; }
        button { padding: 0 25px; border-radius: 25px; border: none; background-color: #0084ff; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Đoạn chat</h2>
        <div class="user-item active">💬
